<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muggable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header (Clickable Logo) -->
        <header>
            <h1 id="logo" title="Back to menu">Muggable</h1>
            <p class="subtitle">idontknowwhattostudypleasehelpme</p>
        </header>

        <!-- Home Screen / Menu -->
        <div id="home-screen">
            <h2>Select Your Subjects</h2>
            <p>Choose the categories you want to study. Leave blank to shuffle everything.</p>
            <div id="filter-container" class="filter-grid">
                <!-- Checkboxes injected by Javascript -->
                <div id="loading-filters">Loading subjects...</div>
            </div>
            <button id="start-btn" class="primary-btn">Start Mugging</button>
        </div>

        <!-- Study Screen (Hidden by default) -->
        <div id="study-screen" style="display: none;">
            <h3 id="pdf-filename">Loading Paper...</h3>
            
            <div id="loading-paper">Extracting a random page... this takes a few seconds...</div>
            
            <img id="paper-image" src="" alt="Exam Paper Page" style="display: none;">
            
            <div class="actions">
                <div class="button-group">
                    <a id="drive-link" href="#" target="_blank" class="secondary-btn" style="display: none;">Question Paper</a>
                    <!-- Ensure this ID matches exactly what is in script.js -->
                    <a id="answer-link" href="#" target="_blank" class="secondary-btn answer-btn" style="display: none;">Answer Key</a>
                </div>
                <button id="next-btn" class="primary-btn" style="display: none;">Next Random Page</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
